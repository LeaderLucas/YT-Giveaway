<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Role System</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="container">

<h2>Login / Signup</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">

<div class="card">

<h3>Dashboard</h3>

<p id="userInfo"></p>

<p id="roleInfo"></p>

<p>
Coins:
<span id="coins">0</span>
</p>

</div>

<!-- STATUS -->
<div class="card">

<h3>Status 📊</h3>

<button onclick="statusFeature()">
Check Status
</button>

</div>

<!-- EARN MONEY -->
<div class="card">

<h3>Earn Money 💰</h3>

<button onclick="earnMoney()">
Earn Coins
</button>

</div>

<!-- SUBSCRIBE VERIFY -->
<div id="subscribeBox" class="card">

<h3>Subscribe Verification ✅</h3>

<button onclick="subscribeVerification()">
Verify Subscribe
</button>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="card hidden">

<h3>Admin Panel 👑</h3>

<button onclick="showDatabase()">
Database 📦
</button>

<button onclick="openNewSubscriberPage()">
New Subscribers 📋
</button>

<button onclick="viewUsers()">
Subscriber Count 👥
</button>

<button onclick="makeAdmin()">
Make Admin 👑
</button>

<button onclick="addCoins()">
Add Coins 💰
</button>

</div>

<button onclick="logout()">
Logout 🚪
</button>

</div>

<!-- USER TABLE -->
<div id="userTableBox" class="container hidden">

<h2>User Table</h2>

<table>

<thead>

<tr>
<th>#</th>
<th>Name</th>
<th>Role</th>
<th>Coins</th>
</tr>

</thead>

<tbody id="userTableBody"></tbody>

</table>

<button onclick="closeTable()">
Close
</button>

</div>

<!-- NEW SUBSCRIBERS PAGE -->
<div id="newSubscriberPage"
class="container hidden">

<div class="card">

<h2
style="
text-align:center;
font-size:28px;
margin-bottom:20px;
color:#00ffcc;
">
NEW SUBSCRIBERS 📋
</h2>

<div
style="
overflow-x:auto;
border-radius:12px;
border:1px solid #444;
">

<table
style="
width:100%;
border-collapse:collapse;
overflow:hidden;
">

<thead>

<tr
style="
background:#222;
color:#00ffcc;
">

<th
style="
padding:14px;
border-bottom:1px solid #444;
">
S.No
</th>

<th
style="
padding:14px;
border-bottom:1px solid #444;
">
Player Name
</th>

<th
style="
padding:14px;
border-bottom:1px solid #444;
">
Status
</th>

</tr>

</thead>

<tbody id="newSubscriberTable">

</tbody>

</table>

</div>

<button
onclick="closeNewSubscriberPage()"
style="
margin-top:20px;
background:#333;
">
Close ❌
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
